name: QA Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    environment: staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache pip
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ai-generator/requirements.txt') }}

      - name: npm audit dashboard-api
        run: npm --prefix dashboard-api audit --audit-level=critical || true

      - name: npm audit dashboard-ui
        run: npm --prefix dashboard-ui audit --audit-level=critical || true

      - name: Install pip-audit
        run: python -m pip install pip-audit

      - name: pip-audit ai-generator
        continue-on-error: true
        run: pip-audit -r ai-generator/requirements.txt

      - name: Notify on failure
        if: failure()
        run: |
          echo "Job security-scan failed"
          echo "Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Configure SLACK_WEBHOOK_URL to enable external notifications"

  build-and-test:
    needs: security-scan
    environment: staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      MONGO_USERNAME: ${{ secrets.MONGO_USERNAME }}
      MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
      MONGO_DB_NAME: qa_platform
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Maven repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('test-engine/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Cache dashboard-api node_modules
        id: cache-dashboard-api-node-modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: dashboard-api/node_modules
          key: ${{ runner.os }}-dashboard-api-node-${{ hashFiles('dashboard-api/package-lock.json') }}

      - name: Cache dashboard-ui node_modules
        id: cache-dashboard-ui-node-modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: dashboard-ui/node_modules
          key: ${{ runner.os }}-dashboard-ui-node-${{ hashFiles('dashboard-ui/package-lock.json') }}

      - name: Cache pip
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ai-generator/requirements.txt') }}

      - name: Start services (MongoDB)
        run: |
          docker compose -f docker-compose.yml up -d

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-generator/requirements.txt

      - name: Install dashboard-api dependencies
        if: steps.cache-dashboard-api-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefix dashboard-api

      - name: Install dashboard-ui dependencies
        if: steps.cache-dashboard-ui-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefix dashboard-ui

      - name: Generate tests (AI)
        run: |
          python ai-generator/main.py --spec ai-generator/specs/petstore.yaml

      - name: Validate generated tests
        run: |
          if [ ! -f test-engine/src/test/java/com/qaplatform/api/PetstoreApiTests.java ]; then
            echo "ERROR: Test generation failed - no test file produced"
            exit 1
          fi
          grep -c "@Test" test-engine/src/test/java/com/qaplatform/api/PetstoreApiTests.java || {
            echo "ERROR: No @Test methods generated"
            exit 1
          }

      - name: Run Java tests
        run: |
          mvn -f test-engine/pom.xml test

      - name: Backfill MongoDB from Surefire reports
        if: always()
        env:
          MONGO_URI: mongodb://127.0.0.1:27017
          MONGO_DB_NAME: qa_platform
        run: |
          python scripts/import_surefire_results.py

      - name: Gap analysis
        if: always()
        run: |
          python ai-generator/gap_analyzer.py

      - name: Check dashboard API
        run: |
          node --check dashboard-api/server.js
          node --check dashboard-api/db.js

      - name: Build dashboard UI
        run: |
          cd dashboard-ui && npm run build

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: test-results
          path: test-engine/target/surefire-reports/

      - name: Notify on failure
        if: failure()
        run: |
          echo "Job build-and-test failed"
          echo "Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "Configure SLACK_WEBHOOK_URL to enable external notifications"

